<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Revelación del Bebé 🦫</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#ffd6e7,#c6e6ff);
text-align:center;
color:#333;
overflow-x:hidden;
}

header{
padding:60px 20px;
}

h1{
font-size:42px;
}

.capy{
font-size:80px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.info{
font-size:22px;
margin:10px 0;
}

.button{

background:#ff5fa2;
color:white;
padding:16px 30px;
border-radius:40px;
text-decoration:none;
font-size:18px;
display:inline-block;
margin-top:25px;
transition:0.3s;
}

.button:hover{
transform:scale(1.1);
background:#ff3f8b;
}

.countdown{
font-size:28px;
margin-top:30px;
font-weight:bold;
}

.map{
margin-top:30px;
border-radius:10px;
overflow:hidden;
}

footer{
margin-top:40px;
padding:20px;
font-size:16px;
}

.capyline{
font-size:40px;
margin-top:20px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

</style>
</head>

<body>

<header>

<div class="capy">🦫🦫🦫</div>

<h1>¡Revelación de Sexo!</h1>

<p>Los capibaras están listos para revelar el secreto 👶</p>

</header>

<div class="container">

<div class="info">📅 <b>4 de abril</b></div>
<div class="info">⏰ <b>2:00 PM</b></div>
<div class="info">📍 <b>La Estancita 1110<br>Colonia Tabachines</b></div>

<a class="button" href="https://forms.gle/TUFORMULARIO">
Confirmar asistencia
</a>

<div class="countdown" id="contador"></div>

<div class="map">

<iframe
src="https://maps.google.com/maps?q=La%20Estancita%201110%20Tabachines&t=&z=15&ie=UTF8&iwloc=&output=embed"
width="100%"
height="300"
frameborder="0">
</iframe>

</div>

<div class="capyline">🦫🦫🦫🦫🦫</div>

</div>

<footer>

Capibaras + sorpresa = día perfecto 🎉

</footer>

<script>

var fechaEvento = new Date("Apr 4, 2026 14:00:00").getTime();

var x = setInterval(function(){

var ahora = new Date().getTime();

var distancia = fechaEvento - ahora;

var dias = Math.floor(distancia/(1000*60*60*24));
var horas = Math.floor((distancia%(1000*60*60*24))/(1000*60*60));
var minutos = Math.floor((distancia%(1000*60*60))/(1000*60));

document.getElementById("contador").innerHTML =
"⏳ Faltan " + dias + " días " + horas + " horas " + minutos + " minutos";

},1000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Revelación Capibaras</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#ffd6e7,#c6e6ff);
text-align:center;
color:#333;
overflow-x:hidden;
}

header{
padding:60px 20px;
}

h1{
font-size:40px;
}

.capibaras{
font-size:60px;
margin-bottom:10px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.info{
font-size:22px;
margin:10px 0;
}

.countdown{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

iframe{
margin-top:30px;
border-radius:10px;
}

footer{
margin-top:40px;
padding:20px;
}

.side{
position:fixed;
bottom:20px;
font-size:70px;
}

.left{
left:10px;
}

.right{
right:10px;
}

@media(max-width:768px){
.side{
font-size:45px;
bottom:10px;
}
}

</style>

</head>

<body>

<header>

<div class="capibaras">
🦫🦫🦫
</div>

<h1>Revelación de Sexo</h1>

<p>Los capibaras están listos para revelar el secreto 👶</p>

</header>

<div class="container">

<div class="info">
📅 <b>4 de abril</b>
</div>

<div class="info">
⏰ <b>2:00 PM</b>
</div>

<div class="info">
📍 <b>La Estancita 1110<br>Colonia Tabachines</b>
</div>

<div class="countdown" id="contador"></div>

<h2>Confirma tu asistencia</h2>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSecXmtQy0bWQXYVFu3nRIrvpm9JmLAuHGxzjwc_0Z7NHKdCrA/viewform?embedded=true" width="640" height="800" frameborder="0" marginheight="0" marginwidth="0">Cargando…</iframe>width="100%"
height="700"
frameborder="0">
</iframe>

<div style="margin-top:30px">

<iframe
src="https://maps.google.com/maps?q=La%20Estancita%201110%20Tabachines&t=&z=15&ie=UTF8&iwloc=&output=embed"
width="100%"
height="300"
frameborder="0">
</iframe>

</div>

</div>

<footer>

🦫 Capibaras + sorpresa = día perfecto 🎉

</footer>

<!-- Capibaras laterales -->

<div class="side left">
🦫🌹
</div>

<div class="side right">
🦫🧢🎒
</div>

<script>

var fechaEvento = new Date("Apr 4, 2026 14:00:00").getTime();

var x = setInterval(function(){

var ahora = new Date().getTime();

var distancia = fechaEvento - ahora;

var dias = Math.floor(distancia/(1000*60*60*24));
var horas = Math.floor((distancia%(1000*60*60*24))/(1000*60*60));
var minutos = Math.floor((distancia%(1000*60*60))/(1000*60));

document.getElementById("contador").innerHTML =
"⏳ Faltan " + dias + " días " + horas + " horas " + minutos + " minutos";

},1000);

</script>

</body>
</html>
